<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机选择器</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="随机选">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 30px 25px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 24px; }
        .categories-wrapper { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 20px; }
        .categories { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
        .category-btn {
            padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 14px;
            background: white; font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; color: #666; white-space: nowrap; position: relative;
            -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .category-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            border-color: transparent; transform: scale(1.03);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .category-btn .delete-cat {
            position: absolute; top: -6px; right: -6px;
            width: 20px; height: 20px; border-radius: 50%;
            background: #e05555; color: white; font-size: 12px;
            border: none; cursor: pointer; display: none;
            align-items: center; justify-content: center; line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .category-btn:hover .delete-cat { display: flex; }
        .add-cat-btn {
            padding: 12px 14px; border: 2px dashed #d0d0ff; border-radius: 14px;
            background: none; font-size: 20px; cursor: pointer; color: #999;
            transition: all 0.3s; white-space: nowrap; min-width: 44px; text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        .add-cat-btn:hover { border-color: #667eea; color: #667eea; background: #f8f9ff; }
        .options-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .option-item {
            background: #f8f9ff; border: 2px solid #e8e8ff; border-radius: 12px;
            padding: 14px 8px; text-align: center; font-size: 15px; font-weight: 500;
            color: #555; cursor: pointer; transition: all 0.3s ease; word-break: break-all;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 56px; -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .option-item .item-desc-preview {
            font-size: 10px; color: #aaa; margin-top: 2px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
        }
        .option-item:hover { border-color: #667eea; background: #eef0ff; }
        .option-item.highlight {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white;
            border-color: transparent; transform: scale(1.06);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5); animation: pop 0.5s ease;
        }
        .option-item.highlight .item-desc-preview { color: rgba(255,255,255,0.7); }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1.06); }
        }
        .result-area { text-align: center; margin-bottom: 18px; min-height: 55px; display: flex; align-items: center; justify-content: center; }
        .result-text {
            font-size: 20px; font-weight: 700; color: #333; padding: 12px 20px;
            background: #f8f9ff; border-radius: 12px; transition: all 0.3s ease; text-align: center;
        }
        .result-text.show {
            background: linear-gradient(135deg, #667eea, #764ba2); color: white; animation: pop 0.5s ease;
        }
        .result-desc { display: block; font-size: 13px; font-weight: 400; margin-top: 4px; opacity: 0.8; }
        .random-btn {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); letter-spacing: 2px;
            -webkit-tap-highlight-color: transparent;
        }
        .random-btn:active { transform: scale(0.96); }
        .tip { text-align: center; color: #aaa; font-size: 12px; margin-top: 12px; line-height: 1.6; }
        .sync-status { text-align: center; font-size: 11px; color: #bbb; margin-top: 4px; min-height: 18px; }
        .reset-btn {
            display: block; margin: 10px auto 0; padding: 8px 16px;
            background: #f5f5f5; border: none; border-radius: 8px;
            font-size: 11px; color: #bbb; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        /* 弹窗 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 20px; padding: 25px 20px; width: 85%;
            max-width: 350px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: pop 0.3s ease;
        }
        .modal-box h3 { margin-bottom: 8px; color: #333; font-size: 18px; }
        .modal-box .subtitle { font-size: 13px; color: #999; margin-bottom: 16px; }
        .modal-box label { display: block; text-align: left; font-size: 13px; color: #888; margin-bottom: 4px; margin-top: 10px; }
        .modal-box input, .modal-box textarea {
            width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 12px;
            font-size: 15px; outline: none; transition: border 0.3s; font-family: inherit;
        }
        .modal-box textarea { resize: vertical; min-height: 60px; }
        .modal-box input:focus, .modal-box textarea:focus { border-color: #667eea; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 16px; }
        .modal-buttons button {
            flex: 1; padding: 12px; border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer; border: none; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-confirm { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-delete {
            background: #ffe0e0; color: #e05555; font-size: 13px;
            margin-top: 12px; width: 100%; padding: 10px; border-radius: 10px;
            border: none; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .add-btn {
            background: none !important; border: 2px dashed #d0d0ff !important;
            color: #999; font-size: 28px; cursor: pointer; border-radius: 12px;
            padding: 8px 0; transition: all 0.3s; font-weight: 300;
            min-height: 56px; display: flex; align-items: center; justify-content: center;
        }
        .add-btn:hover { border-color: #667eea !important; color: #667eea; background: #f8f9ff !important; }
        #tokenModal .modal-box { max-width: 380px; }
        #tokenModal .help-text { font-size: 12px; color: #999; text-align: left; margin-bottom: 10px; line-height: 1.5; }
        #tokenModal .help-text a { color: #667eea; }
    </style>
</head>
<body>
    <div class="container">
        <h1> 共享随机选择器</h1>
        <div class="categories-wrapper">
            <div class="categories" id="categoryBtns"></div>
            <button class="add-cat-btn" onclick="addCategory()" title="添加分类">+</button>
        </div>
        <div class="options-grid" id="optionsGrid"></div>
        <div class="result-area">
            <span class="result-text" id="resultText">点击下方按钮随机选择</span>
        </div>
        <button class="random-btn" onclick="randomPick()">✨ 随 机 选 择</button>
        <p class="tip"> 点击选项编辑 | 长按分类可删除<br> 右侧 + 添加新分类 | 修改自动同步</p>
        <p class="sync-status" id="syncStatus"></p>
        <button class="reset-btn" onclick="if(confirm('确定要重置所有数据吗？此操作不可恢复。')){localStorage.clear();location.reload();}">⚠️ 重置本地数据</button>
    </div>
    <!-- 编辑选项弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <h3 id="modalTitle">选项详情</h3>
            <p class="subtitle" id="modalSubtitle"></p>
            <label>名称</label>
            <input type="text" id="modalName" placeholder="选项名称">
            <label>介绍</label>
            <textarea id="modalDesc" placeholder="添加一段介绍..."></textarea>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="confirmEdit()">保存</button>
            </div>
            <button class="btn-delete" id="btnDelete" onclick="deleteOption()"> 删除此选项</button>
        </div>
    </div>
    <!-- 添加分类弹窗 -->
    <div class="modal-overlay" id="catModal">
        <div class="modal-box">
            <h3>添加新分类</h3>
            <p class="subtitle">输入分类名称（如：夜宵、零食）</p>
            <label>分类名称</label>
            <input type="text" id="catNameInput" placeholder="例如：夜宵">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeCatModal()">取消</button>
                <button class="btn-confirm" onclick="confirmAddCategory()">添加</button>
            </div>
        </div>
    </div>
    <!-- Token 设置弹窗 -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal-box">
            <h3> 首次设置</h3>
            <p class="subtitle">请输入你的 GitHub Token 以启用同步</p>
            <div class="help-text">
                获取方式：GitHub → Settings → Developer settings → Personal access tokens → Generate new token (classic)，勾选 <b>repo</b> 权限。<br>
                <a href="https://github.com/settings/tokens" target="_blank"> 点此快速跳转</a>
            </div>
            <label>GitHub 用户名</label>
            <input type="text" id="tokenUsername" placeholder="例如 dabai123">
            <label>仓库名</label>
            <input type="text" id="tokenRepo" placeholder="例如 dabai123.github.io">
            <label>Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxx">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="skipToken()">跳过（仅本地使用）</button>
                <button class="btn-confirm" onclick="saveToken()">保存并同步</button>
            </div>
        </div>
    </div>
    <script>
        const FILE_PATH = 'shared-data.json';
        let GITHUB_USERNAME = '';
        let REPO_NAME = '';
        let GITHUB_TOKEN = '';
        let API_URL = '';
        let data = {};
        let currentCategory = '';
        let editingIndex = -1;
        let fileSHA = '';
        let syncEnabled = false;
        function setStatus(msg, isError = false) {
            const el = document.getElementById('syncStatus');
            if (!el) return;
            el.textContent = msg;
            el.style.color = isError ? '#e05555' : '#4caf50';
            if (!isError) setTimeout(() => { el.textContent = ''; }, 3000);
        }
        function loadTokenConfig() {
            GITHUB_USERNAME = localStorage.getItem('gh_username') || '';
            REPO_NAME = localStorage.getItem('gh_repo') || '';
            GITHUB_TOKEN = localStorage.getItem('gh_token') || '';
            if (GITHUB_USERNAME && REPO_NAME && GITHUB_TOKEN) {
                API_URL = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${FILE_PATH}`;
                syncEnabled = true;
                return true;
            }
            return false;
        }
        async function loadFromCloud() {
            if (!syncEnabled) {
                loadLocalFallback();
                return;
            }
            setStatus(' 加载中...');
            try {
                const response = await fetch(API_URL, {
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}` }
                });
                if (!response.ok) throw new Error('加载失败');
                const json = await response.json();
                fileSHA = json.sha;
                const content = JSON.parse(atob(json.content));
                data = content;
                setStatus('✅ 已同步最新数据');
                localStorage.setItem('sharedPickerBackup', JSON.stringify(data));
            } catch (err) {
                console.error(err);
                setStatus('⚠️ 加载云端失败，使用本地缓存', true);
                loadLocalFallback();
            }
            initApp();
        }
        function loadLocalFallback() {
            const local = localStorage.getItem('sharedPickerBackup');
            if (local) {
                try { data = JSON.parse(local); } catch(e) {}
            }
            if (!data || Object.keys(data).length === 0) {
                data = {
                    '早餐': [{ name: '包子', desc: '热腾腾的鲜肉包' }, { name: '油条', desc: '酥脆金黄' }, { name: '豆浆', desc: '现磨香浓' }],
                    '午餐': [{ name: '黄焖鸡', desc: '下饭神器' }, { name: '麻辣烫', desc: '随心搭配' }, { name: '盖浇饭', desc: '锅气十足' }],
                    '晚餐': [{ name: '沙拉', desc: '低卡健康' }, { name: '火锅', desc: '热闹过瘾' }, { name: '烧烤', desc: '滋滋冒油' }]
                };
            }
        }
        async function saveToCloud() {
            localStorage.setItem('sharedPickerBackup', JSON.stringify(data));
            if (!syncEnabled) {
                setStatus(' 已保存到本地（未配置同步）');
                return;
            }
            setStatus('⏳ 同步中...');
            try {
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
                const body = { message: '更新数据', content: content, sha: fileSHA };
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                if (!response.ok) throw new Error('上传失败');
                const json = await response.json();
                fileSHA = json.content.sha;
                setStatus('✅ 已同步到云端，家人刷新可见');
            } catch (err) {
                console.error(err);
                setStatus('⚠️ 同步失败，数据已存本地', true);
            }
        }
        function initApp() {
            const cats = Object.keys(data);
            if (cats.length === 0) {
                data['默认'] = [{ name: '示例选项', desc: '点击编辑我' }];
            }
            if (!data[currentCategory]) {
                currentCategory = Object.keys(data)[0];
            }
            renderCategories();
            renderOptions();
        }
        function renderCategories() {
            const container = document.getElementById('categoryBtns');
            if (!container) return;
            container.innerHTML = '';
            Object.keys(data).forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                if (cat === currentCategory) btn.classList.add('active');
                const label = document.createElement('span');
                label.textContent = cat;
                btn.appendChild(label);
                const delBtn = document.createElement('span');
                delBtn.className = 'delete-cat';
                delBtn.textContent = '×';
                delBtn.title = '删除分类';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteCategory(cat);
                };
                btn.appendChild(delBtn);
                btn.onclick = () => switchCategory(cat);
                container.appendChild(btn);
            });
        }
        function renderOptions() {
            const grid = document.getElementById('optionsGrid');
            if (!grid) return;
            grid.innerHTML = '';
            if (!data[currentCategory]) return;
            data[currentCategory].forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'option-item';
                const descPreview = item.desc ? item.desc.substring(0, 6) + (item.desc.length > 6 ? '…' : '') : '';
                div.innerHTML = item.name + (descPreview ? `<span class="item-desc-preview">${descPreview}</span>` : '');
                div.onclick = () => openEditModal(index);
                grid.appendChild(div);
            });
            const addDiv = document.createElement('div');
            addDiv.className = 'option-item add-btn';
            addDiv.innerHTML = '+';
            addDiv.onclick = () => openAddModal();
            grid.appendChild(addDiv);
        }
        function switchCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderOptions();
            clearResult();
        }
        function addCategory() {
            document.getElementById('catNameInput').value = '';
            document.getElementById('catModal').classList.add('show');
            setTimeout(() => document.getElementById('catNameInput').focus(), 200);
        }
        function closeCatModal() {
            document.getElementById('catModal').classList.remove('show');
        }
        async function confirmAddCategory() {
            const name = document.getElementById('catNameInput').value.trim();
            if (!name) { alert('分类名称不能为空'); return; }
            if (data[name]) { alert('该分类已存在'); return; }
            data[name] = [];
            currentCategory = name;
            renderCategories();
            renderOptions();
            closeCatModal();
            await saveToCloud();
        }
        async function deleteCategory(cat) {
            const cats = Object.keys(data);
            if (cats.length <= 1) {
                alert('至少保留一个分类');
                return;
            }
            if (!confirm(`确定要删除「${cat}」分类及其所有选项吗？此操作不可恢复。`)) return;
            delete data[cat];
            if (currentCategory === cat) {
                currentCategory = Object.keys(data)[0];
            }
            renderCategories();
            renderOptions();
            clearResult();
            await saveToCloud();
        }
        function clearResult() {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('highlight'));
            const result = document.getElementById('resultText');
            if (result) {
                result.innerHTML = '点击下方按钮随机选择';
                result.classList.remove('show');
            }
        }
        function randomPick() {
            if (!data[currentCategory] || data[currentCategory].length === 0) {
                alert('当前分类还没有选项，请先添加');
                return;
            }
            const options = data[currentCategory];
            const randomIndex = Math.floor(Math.random() * options.length);
            const picked = options[randomIndex];
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('highlight'));
            const items = document.querySelectorAll('.option-item');
            if (items[randomIndex]) items[randomIndex].classList.add('highlight');
            const result = document.getElementById('resultText');
            if (result) {
                let descHTML = picked.desc ? `<span class="result-desc">${picked.desc}</span>` : '';
                result.innerHTML = ` ${currentCategory}：${picked.name}${descHTML}`;
                result.classList.add('show');
            }
            const btn = document.querySelector('.random-btn');
            if (btn) {
                btn.style.transform = 'scale(0.94)';
                setTimeout(() => { btn.style.transform = ''; }, 150);
            }
        }
        function openEditModal(index) {
            editingIndex = index;
            const item = data[currentCategory][index];
            document.getElementById('modalTitle').textContent = '编辑选项';
            document.getElementById('modalSubtitle').textContent = `分类：${currentCategory}`;
            document.getElementById('modalName').value = item.name;
            document.getElementById('modalDesc').value = item.desc || '';
            document.getElementById('btnDelete').style.display = 'block';
            document.getElementById('modalOverlay').classList.add('show');
            setTimeout(() => document.getElementById('modalName').focus(), 200);
        }
        function openAddModal() {
            editingIndex = -1;
            document.getElementById('modalTitle').textContent = '添加选项';
            document.getElementById('modalSubtitle').textContent = `分类：${currentCategory}`;
            document.getElementById('modalName').value = '';
            document.getElementById('modalDesc').value = '';
            document.getElementById('btnDelete').style.display = 'none';
            document.getElementById('modalOverlay').classList.add('show');
            setTimeout(() => document.getElementById('modalName').focus(), 200);
        }
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            editingIndex = -1;
        }
        async function confirmEdit() {
            const name = document.getElementById('modalName').value.trim();
            const desc = document.getElementById('modalDesc').value.trim();
            if (!name) { alert('名称不能为空'); return; }
            const newItem = { name, desc };
            if (editingIndex >= 0) {
                data[currentCategory][editingIndex] = newItem;
            } else {
                data[currentCategory].push(newItem);
            }
            renderOptions();
            clearResult();
            closeModal();
            await saveToCloud();
        }
        async function deleteOption() {
            if (editingIndex < 0) return;
            if (!confirm(`确定要删除「${data[currentCategory][editingIndex].name}」吗？`)) return;
            data[currentCategory].splice(editingIndex, 1);
            renderOptions();
            clearResult();
            closeModal();
            await saveToCloud();
        }
        function saveToken() {
            const username = document.getElementById('tokenUsername').value.trim();
            const repo = document.getElementById('tokenRepo').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            if (!username || !repo || !token) { alert('请填写所有字段'); return; }
            localStorage.setItem('gh_username', username);
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);
            document.getElementById('tokenModal').classList.remove('show');
            loadTokenConfig();
            loadFromCloud();
        }
        function skipToken() {
            document.getElementById('tokenModal').classList.remove('show');
            syncEnabled = false;
            loadLocalFallback();
            initApp();
            setStatus(' 仅本地使用，不会同步');
        }
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById('catModal').addEventListener('click', function(e) {
            if (e.target === this) closeCatModal();
        });
        document.getElementById('modalDesc').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) confirmEdit();
        });
        document.getElementById('catNameInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') confirmAddCategory();
        });
        // 启动
        if (loadTokenConfig()) {
            loadFromCloud();
        } else {
            loadLocalFallback();
            initApp();
            document.getElementById('tokenModal').classList.add('show');
        }
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('✅ SW 注册成功'))
                .catch(err => console.log('SW 失败:', err));
        }
    </script>
</body>
</html>
