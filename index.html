<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="随机选择器">
  <link rel="manifest" href="data:application/manifest+json,{"name":"随机选择器","short_name":"选择器","start_url":".","display":"standalone","background_color":"#f5f5f5","theme_color":"#4A90D9","icons":[{"src":"data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>","sizes":"any","type":"image/svg+xml"}]}">
  <title>🍽️ 随机选择器 - PWA</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 16px;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .app-header {
      text-align: center;
      color: white;
      margin-bottom: 20px;
    }

    .app-header h1 {
      font-size: 2.2em;
      font-weight: 700;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .sync-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 0.85em;
      opacity: 0.9;
    }

    .sync-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #4CAF50;
      display: inline-block;
    }

    .sync-indicator.syncing {
      background: #FFC107;
      animation: pulse 1s infinite;
    }

    .sync-indicator.error {
      background: #F44336;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      backdrop-filter: blur(10px);
    }

    .category-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .category-btn {
      flex: 1;
      min-width: 80px;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 25px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      color: #555;
      white-space: nowrap;
    }

    .category-btn.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .result-display {
      text-align: center;
      padding: 30px 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      border-radius: 15px;
      margin-bottom: 20px;
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }

    .result-display:hover {
      transform: scale(1.02);
    }

    .result-display .placeholder {
      color: #999;
      font-size: 1.1em;
    }

    .result-display .selected-item {
      font-size: 2em;
      font-weight: 700;
      color: #333;
    }

    .result-display .item-desc {
      font-size: 0.9em;
      color: #666;
      margin-top: 8px;
      max-width: 300px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1;
      min-width: 80px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:hover {
      background: #5a6fd6;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #555;
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
    }

    .items-list {
      margin-top: 15px;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #eee;
      gap: 10px;
      transition: background 0.2s;
    }

    .item-row:hover {
      background: #f9f9f9;
    }

    .item-info {
      flex: 1;
      cursor: pointer;
    }

    .item-name {
      font-weight: 600;
      color: #333;
    }

    .item-desc-preview {
      font-size: 0.8em;
      color: #888;
      margin-top: 2px;
    }

    .item-actions {
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f0f0f0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9em;
      transition: all 0.2s;
    }

    .icon-btn:hover {
      background: #e0e0e0;
    }

    .add-section {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 120px;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 0.95em;
      outline: none;
      transition: border 0.3s;
    }

    .input-group input:focus {
      border-color: #667eea;
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(3px);
    }

    .modal {
      background: white;
      border-radius: 20px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .modal h3 {
      margin-bottom: 15px;
      color: #333;
    }

    .modal input, .modal textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 12px;
      font-size: 0.95em;
      font-family: inherit;
      outline: none;
    }

    .modal textarea {
      min-height: 80px;
      resize: vertical;
    }

    .modal .btn-group {
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }

    /* 密码验证页面样式 */
    .password-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }

    .password-card {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }

    .password-card h2 {
      font-size: 1.8em;
      margin-bottom: 10px;
      color: #333;
    }

    .password-card .lock-icon {
      font-size: 3em;
      margin-bottom: 15px;
    }

    .password-card p {
      color: #666;
      margin-bottom: 25px;
      font-size: 0.9em;
    }

    .password-card input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e0e0e0;
      border-radius: 25px;
      font-size: 1.1em;
      text-align: center;
      letter-spacing: 3px;
      outline: none;
      transition: border 0.3s;
      margin-bottom: 15px;
    }

    .password-card input:focus {
      border-color: #667eea;
    }

    .password-card .error-msg {
      color: #F44336;
      font-size: 0.85em;
      margin-bottom: 10px;
      min-height: 20px;
    }

    @media (max-width: 400px) {
      .category-btn {
        font-size: 0.85em;
        padding: 10px 12px;
      }
      .btn {
        padding: 10px 14px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <!-- 密码验证层（仅首次访问时显示） -->
  <div class="password-overlay hidden" id="passwordOverlay">
    <div class="password-card">
      <div class="lock-icon">🔐</div>
      <h2>首次访问验证</h2>
      <p>请输入密码以访问应用<br><span style="font-size:0.8em; color:#888;">（仅需输入一次，以后自动登录）</span></p>
      <input type="password" id="passwordInput" placeholder="请输入密码" maxlength="20" autofocus>
      <div class="error-msg" id="passwordError"></div>
      <button class="btn btn-primary" onclick="verifyPassword()" style="width:100%;">🔓 验证并记住</button>
    </div>
  </div>

  <!-- 主应用内容（默认隐藏） -->
  <div id="mainApp" class="hidden">
    <div class="container">
      <div class="app-header">
        <h1>🎲 随机选择器</h1>
        <div class="sync-status">
          <span class="sync-indicator" id="syncIndicator"></span>
          <span id="syncText">准备同步</span>
        </div>
      </div>

      <!-- 分类选择 -->
      <div class="card">
        <div class="category-selector" id="categorySelector">
          <!-- 动态生成分类按钮 -->
        </div>
        <button class="btn btn-secondary" onclick="showAddCategoryModal()" style="width:100%; margin-top:10px;">
          ➕ 添加分类
        </button>
      </div>

      <!-- 随机结果展示 -->
      <div class="card">
        <div class="result-display" id="resultDisplay" onclick="showItemDetail()">
          <span class="placeholder">点击下方按钮随机选择</span>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="randomSelect()">🎯 随机选择</button>
          <button class="btn btn-secondary" onclick="clearResult()">🔄 清除</button>
        </div>
      </div>

      <!-- 选项列表 -->
      <div class="card">
        <h3 style="margin-bottom: 10px;">📋 <span id="currentCategoryLabel">选项列表</span></h3>
        <div class="items-list" id="itemsList">
          <!-- 动态生成选项 -->
        </div>
        <div class="add-section">
          <div class="input-group">
            <input type="text" id="newItemName" placeholder="选项名称" maxlength="50">
          </div>
          <div class="input-group">
            <input type="text" id="newItemDesc" placeholder="简介(可选)" maxlength="200">
          </div>
          <button class="btn btn-primary" onclick="addItem()" style="min-width:60px;">➕</button>
        </div>
      </div>
    </div>

    <!-- 选项详情弹窗 -->
    <div class="modal-overlay hidden" id="detailModal">
      <div class="modal">
        <h3 id="detailTitle">选项详情</h3>
        <p id="detailDesc" style="color:#666; margin-bottom:15px;"></p>
        <button class="btn btn-primary" onclick="closeDetailModal()" style="width:100%;">关闭</button>
      </div>
    </div>

    <!-- 添加分类弹窗 -->
    <div class="modal-overlay hidden" id="categoryModal">
      <div class="modal">
        <h3>添加新分类</h3>
        <input type="text" id="newCategoryName" placeholder="分类名称，如：早餐" maxlength="20">
        <div class="btn-group">
          <button class="btn btn-primary" onclick="addCategory()">✅ 添加</button>
          <button class="btn btn-secondary" onclick="closeCategoryModal()">取消</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    const CORRECT_PASSWORD = '123654';
    const AUTH_STORAGE_KEY = 'randomPickerAuthenticated';
    
    // GitHub 配置（直接写在代码中）
    const GITHUB_CONFIG = {
      token: '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', // 请替换为你的 GitHub Token
      gistId: '' // 留空会自动创建，或填入已有的 Gist ID
    };

    // ==================== 密码验证 ====================
    function checkAuthentication() {
      // 检查 localStorage 中是否有验证标记
      const isAuthenticated = localStorage.getItem(AUTH_STORAGE_KEY) === 'true';
      
      if (isAuthenticated) {
        // 已验证过，直接显示应用
        document.getElementById('passwordOverlay').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        initApp();
      } else {
        // 首次访问，显示密码输入界面
        document.getElementById('passwordOverlay').classList.remove('hidden');
        document.getElementById('mainApp').classList.add('hidden');
        document.getElementById('passwordInput').focus();
      }
    }
    
    function verifyPassword() {
      const input = document.getElementById('passwordInput');
      const errorMsg = document.getElementById('passwordError');
      const password = input.value.trim();
      
      if (password === CORRECT_PASSWORD) {
        // 密码正确，保存验证状态到 localStorage（永久记住）
        localStorage.setItem(AUTH_STORAGE_KEY, 'true');
        
        // 隐藏密码层，显示应用
        document.getElementById('passwordOverlay').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        
        // 初始化应用
        initApp();
      } else {
        // 密码错误
        errorMsg.textContent = '❌ 密码错误，请重试';
        input.value = '';
        input.focus();
        
        // 震动效果
        input.style.borderColor = '#F44336';
        setTimeout(() => {
          input.style.borderColor = '#e0e0e0';
        }, 1000);
      }
    }
    
    // 支持回车键提交密码
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
          verifyPassword();
        }
      });
      
      // 检查验证状态
      checkAuthentication();
    });

    // ==================== 应用状态 ====================
    const DEFAULT_CATEGORIES = ['早餐', '午餐', '晚餐'];
    let appData = {
      categories: [...DEFAULT_CATEGORIES],
      items: {}
    };
    
    DEFAULT_CATEGORIES.forEach(cat => {
      appData.items[cat] = [];
    });

    let currentCategory = DEFAULT_CATEGORIES[0];
    let selectedItem = null;
    let syncConfig = {
      token: GITHUB_CONFIG.token,
      gistId: ''
    };
    let syncTimer = null;
    let isSyncing = false;

    // ==================== 初始化应用 ====================
    function initApp() {
      loadLocalData();
      loadSyncConfig();
      renderCategories();
      renderItems();
      
      if (syncConfig.token && syncConfig.gistId) {
        updateSyncStatus('ready', '已配置同步');
        syncFromGist(true);
      } else if (syncConfig.token && !syncConfig.gistId) {
        updateSyncStatus('ready', '首次使用，将自动创建同步');
        createNewGist();
      } else {
        updateSyncStatus('ready', '未配置同步');
      }
      
      startAutoSync();
    }

    function loadLocalData() {
      const saved = localStorage.getItem('randomPickerData');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.categories && parsed.items) {
            appData = parsed;
            if (!appData.categories.includes(currentCategory)) {
              currentCategory = appData.categories[0] || DEFAULT_CATEGORIES[0];
            }
          }
        } catch (e) {
          console.error('加载本地数据失败', e);
        }
      }
    }

    function saveLocalData() {
      localStorage.setItem('randomPickerData', JSON.stringify(appData));
    }

    function loadSyncConfig() {
      const saved = localStorage.getItem('randomPickerGistId');
      if (saved) {
        syncConfig.gistId = saved;
      }
      // 也检查代码中的默认值
      if (!syncConfig.gistId && GITHUB_CONFIG.gistId) {
        syncConfig.gistId = GITHUB_CONFIG.gistId;
      }
    }

    function saveSyncConfigToStorage() {
      if (syncConfig.gistId) {
        localStorage.setItem('randomPickerGistId', syncConfig.gistId);
      }
    }

    // ==================== 渲染函数 ====================
    function renderCategories() {
      const container = document.getElementById('categorySelector');
      container.innerHTML = appData.categories.map(cat => `
        <button class="category-btn ${cat === currentCategory ? 'active' : ''}" 
                onclick="switchCategory('${escapeHtml(cat)}')">
          ${escapeHtml(cat)}
          ${appData.categories.length > 1 ? `<span style="margin-left:4px; opacity:0.7; font-size:0.8em;" onclick="event.stopPropagation(); deleteCategory('${escapeHtml(cat)}')">×</span>` : ''}
        </button>
      `).join('');
      
      document.getElementById('currentCategoryLabel').textContent = currentCategory;
    }

    function renderItems() {
      const container = document.getElementById('itemsList');
      const items = appData.items[currentCategory] || [];
      
      if (items.length === 0) {
        container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">暂无选项，请添加</div>';
        return;
      }
      
      container.innerHTML = items.map((item, index) => `
        <div class="item-row">
          <div class="item-info" onclick="showItemDetailByIndex(${index})">
            <div class="item-name">${escapeHtml(item.name)}</div>
            ${item.desc ? `<div class="item-desc-preview">${escapeHtml(item.desc.substring(0, 30))}${item.desc.length > 30 ? '...' : ''}</div>` : ''}
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="editItem(${index})" title="编辑">✏️</button>
            <button class="icon-btn" onclick="deleteItem(${index})" title="删除" style="color:#ff6b6b;">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================== 业务逻辑 ====================
    function switchCategory(cat) {
      currentCategory = cat;
      selectedItem = null;
      renderCategories();
      renderItems();
      clearResult();
    }

    function addCategory() {
      const nameInput = document.getElementById('newCategoryName');
      const name = nameInput.value.trim();
      
      if (!name) {
        alert('请输入分类名称');
        return;
      }
      
      if (appData.categories.includes(name)) {
        alert('该分类已存在');
        return;
      }
      
      appData.categories.push(name);
      appData.items[name] = [];
      
      saveLocalData();
      renderCategories();
      closeCategoryModal();
      nameInput.value = '';
      
      syncToGist();
    }

    function deleteCategory(cat) {
      if (appData.categories.length <= 1) {
        alert('至少保留一个分类');
        return;
      }
      
      if (!confirm(`确定要删除分类"${cat}"及其所有选项吗？`)) return;
      
      const index = appData.categories.indexOf(cat);
      if (index > -1) {
        appData.categories.splice(index, 1);
        delete appData.items[cat];
        
        if (currentCategory === cat) {
          currentCategory = appData.categories[0];
        }
        
        saveLocalData();
        renderCategories();
        renderItems();
        clearResult();
        syncToGist();
      }
    }

    function addItem() {
      const nameInput = document.getElementById('newItemName');
      const descInput = document.getElementById('newItemDesc');
      const name = nameInput.value.trim();
      const desc = descInput.value.trim();
      
      if (!name) {
        alert('请输入选项名称');
        return;
      }
      
      if (!appData.items[currentCategory]) {
        appData.items[currentCategory] = [];
      }
      
      if (appData.items[currentCategory].some(item => item.name === name)) {
        alert('该选项已存在');
        return;
      }
      
      appData.items[currentCategory].push({ name, desc });
      
      saveLocalData();
      renderItems();
      nameInput.value = '';
      descInput.value = '';
      nameInput.focus();
      
      syncToGist();
    }

    function deleteItem(index) {
      if (!confirm('确定删除这个选项吗？')) return;
      
      appData.items[currentCategory].splice(index, 1);
      if (selectedItem && selectedItem.category === currentCategory && selectedItem.index === index) {
        selectedItem = null;
        clearResult();
      }
      
      saveLocalData();
      renderItems();
      syncToGist();
    }

    function editItem(index) {
      const item = appData.items[currentCategory][index];
      const newName = prompt('编辑选项名称:', item.name);
      if (newName === null) return;
      const trimmedName = newName.trim();
      if (!trimmedName) {
        alert('名称不能为空');
        return;
      }
      
      const newDesc = prompt('编辑简介:', item.desc || '');
      if (newDesc === null) return;
      
      item.name = trimmedName;
      item.desc = newDesc.trim();
      
      saveLocalData();
      renderItems();
      syncToGist();
    }

    function randomSelect() {
      const items = appData.items[currentCategory] || [];
      
      if (items.length === 0) {
        alert(`"${currentCategory}" 分类下没有选项，请先添加`);
        return;
      }
      
      const randomIndex = Math.floor(Math.random() * items.length);
      const item = items[randomIndex];
      
      selectedItem = {
        category: currentCategory,
        index: randomIndex,
        name: item.name,
        desc: item.desc
      };
      
      displayResult(item);
    }

    function displayResult(item) {
      const display = document.getElementById('resultDisplay');
      display.innerHTML = `
        <div class="selected-item">${escapeHtml(item.name)}</div>
        ${item.desc ? `<div class="item-desc">${escapeHtml(item.desc)}</div>` : ''}
        <div style="font-size:0.7em; color:#888; margin-top:8px;">点击查看详情</div>
      `;
    }

    function clearResult() {
      selectedItem = null;
      document.getElementById('resultDisplay').innerHTML = '<span class="placeholder">点击下方按钮随机选择</span>';
    }

    function showItemDetail() {
      if (!selectedItem) return;
      
      document.getElementById('detailTitle').textContent = selectedItem.name;
      document.getElementById('detailDesc').textContent = selectedItem.desc || '暂无详细介绍';
      document.getElementById('detailModal').classList.remove('hidden');
    }

    function showItemDetailByIndex(index) {
      const item = appData.items[currentCategory][index];
      selectedItem = {
        category: currentCategory,
        index: index,
        name: item.name,
        desc: item.desc
      };
      displayResult(item);
      showItemDetail();
    }

    function closeDetailModal() {
      document.getElementById('detailModal').classList.add('hidden');
    }

    function showAddCategoryModal() {
      document.getElementById('categoryModal').classList.remove('hidden');
      document.getElementById('newCategoryName').focus();
    }

    function closeCategoryModal() {
      document.getElementById('categoryModal').classList.add('hidden');
    }

    window.addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) {
        e.target.classList.add('hidden');
      }
    });

    // ==================== GitHub 同步 ====================
    async function createNewGist() {
      if (!syncConfig.token) {
        updateSyncStatus('error', '缺少Token配置');
        return;
      }
      
      updateSyncStatus('syncing', '正在创建 Gist...');
      
      try {
        const response = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: {
            'Authorization': `token ${syncConfig.token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            description: '随机选择器数据 - 自动同步',
            public: false,
            files: {
              'picker-data.json': {
                content: JSON.stringify(appData, null, 2)
              }
            }
          })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || '创建Gist失败');
        }
        
        const data = await response.json();
        syncConfig.gistId = data.id;
        saveSyncConfigToStorage();
        
        updateSyncStatus('ready', '同步已创建');
        console.log('✅ Gist 创建成功，ID:', data.id);
      } catch (error) {
        console.error('创建Gist失败:', error);
        updateSyncStatus('error', '创建失败: ' + error.message);
      }
    }

    async function syncFromGist(silent = false) {
      if (!syncConfig.token || !syncConfig.gistId) {
        if (!silent) {
          console.log('同步配置不完整');
        }
        return;
      }
      
      if (isSyncing) return;
      isSyncing = true;
      updateSyncStatus('syncing', '同步中...');
      
      try {
        const response = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
          headers: {
            'Authorization': `token ${syncConfig.token}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || '获取Gist失败');
        }
        
        const data = await response.json();
        const file = data.files['picker-data.json'];
        
        if (file && file.content) {
          const remoteData = JSON.parse(file.content);
          
          if (remoteData.categories && remoteData.items) {
            appData = remoteData;
            if (!appData.categories.includes(currentCategory)) {
              currentCategory = appData.categories[0] || DEFAULT_CATEGORIES[0];
            }
            saveLocalData();
            renderCategories();
            renderItems();
            clearResult();
            
            if (!silent) {
              console.log('✅ 从 Gist 同步成功');
            }
            updateSyncStatus('ready', '同步成功');
          }
        }
      } catch (error) {
        console.error('同步失败:', error);
        updateSyncStatus('error', '同步失败');
      } finally {
        isSyncing = false;
      }
    }

    async function syncToGist() {
      if (!syncConfig.token || !syncConfig.gistId) return;
      
      if (isSyncing) {
        setTimeout(() => syncToGist(), 2000);
        return;
      }
      
      isSyncing = true;
      updateSyncStatus('syncing', '上传中...');
      
      try {
        const response = await fetch(`https://api.github.com/gists/${syncConfig.gistId}`, {
          method: 'PATCH',
          headers: {
            'Authorization': `token ${syncConfig.token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            files: {
              'picker-data.json': {
                content: JSON.stringify(appData, null, 2)
              }
            }
          })
        });
        
        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.message || '更新Gist失败');
        }
        
        updateSyncStatus('ready', '已同步');
        console.log('✅ 数据已上传到 Gist');
      } catch (error) {
        console.error('上传失败:', error);
        updateSyncStatus('error', '上传失败: ' + error.message);
      } finally {
        isSyncing = false;
      }
    }

    function startAutoSync() {
      if (syncTimer) clearInterval(syncTimer);
      
      // 每30秒自动从Gist拉取更新
      syncTimer = setInterval(() => {
        if (syncConfig.token && syncConfig.gistId && !isSyncing) {
          syncFromGist(true);
        }
      }, 30000);
      
      // 本地数据变化后延迟上传（防抖）
      let uploadTimeout;
      const originalSaveLocalData = saveLocalData;
      saveLocalData = function() {
        originalSaveLocalData();
        clearTimeout(uploadTimeout);
        uploadTimeout = setTimeout(() => {
          if (syncConfig.token && syncConfig.gistId) {
            syncToGist();
          }
        }, 2000);
      };
    }

    function updateSyncStatus(status, text) {
      const indicator = document.getElementById('syncIndicator');
      const textEl = document.getElementById('syncText');
      
      indicator.className = 'sync-indicator';
      if (status === 'syncing') indicator.classList.add('syncing');
      if (status === 'error') indicator.classList.add('error');
      
      textEl.textContent = text;
    }

    // 注册Service Worker实现PWA离线缓存
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register(
          URL.createObjectURL(
            new Blob([`
              self.addEventListener('install', event => {
                self.skipWaiting();
              });
              self.addEventListener('activate', event => {
                event.waitUntil(self.clients.claim());
              });
              self.addEventListener('fetch', event => {
                event.respondWith(
                  fetch(event.request).catch(() => {
                    return caches.match(event.request);
                  })
                );
              });
            `], { type: 'application/javascript' })
          )
        ).catch(err => console.log('SW注册失败:', err));
      });
    }
  </script>
</body>
